<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Resource | SparkJaar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        .claim-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .claim-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .claim-card h1 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }
        .claim-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }
        .claim-form input {
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: #fff;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
            width: 100%;
        }
        .claim-form input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.1);
        }
    </style>
</head>
<body>
    <div class="claim-container">
        <div class="claim-card">
            <a href="/" style="display: inline-block; margin-bottom: 2rem;">
                <img src="assets/logos/full_for_light_theame.png" alt="SparkJaar Logo" style="width: 180px;">
            </a>
            
            <div id="form-container">
                <h1>Claim Your Free Resource</h1>
                <p style="color: var(--text-muted); margin-bottom: 1rem;">Enter your details below to instantly access your document.</p>
                
                <form class="claim-form" id="claim-form">
                    <input type="text" id="userName" placeholder="Enter your full name" required aria-label="Full name">
                    <input type="email" id="userEmail" placeholder="Enter your email address" required aria-label="Email address">
                    <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Get Access Now</button>
                </form>
                <p id="form-message" style="margin-top: 1rem; font-size: 0.9rem;"></p>
            </div>

            <div id="resource-container" style="display: none;">
                <h1 style="color: green;">Success!</h1>
                <p style="color: var(--text-muted); margin-bottom: 2rem;">Your resource is ready. Click the button below to open it in Google Drive.</p>
                <a id="drive-link" href="#" target="_blank" class="btn btn-primary" style="width: 100%;">Open Document</a>
            </div>
        </div>
    </div>

    <script src="claim.js"></script>
</body>
</html>
